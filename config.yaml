# Saved searches for the Zillow scraper.
#
# Usage: python main.py scrape <name>
#
# Each entry maps a short name to a Zillow search URL plus any options.
# Copy the URL directly from your browser after applying all filters.
# CLI flags override these values when explicitly provided.
#
# Available options (all optional):
#   url           (required) full Zillow search URL
#   type          "sale", "rent", or "both" — inferred from URL if omitted
#   pages         max pages to scrape (default: 5, Zillow caps at 20)
#   enrich        true/false — fetch detail pages for rent Zestimates (default: false)
#   skip_recent   integer days — skip re-enriching properties updated within N days
#   filter_rentals true/false — keep only SFH/duplexes from rental results (default: false)
#
# Example:
#
# searches:
#   austin-sfh:
#     url: "https://www.zillow.com/austin-tx/houses/"
#     type: sale
#     pages: 20
#     enrich: true
#     skip_recent: 7
#
#   tampa-rentals:
#     url: "https://www.zillow.com/tampa-fl/rentals/"
#     type: rent
#     pages: 20
#     filter_rentals: true
#     skip_recent: 3


# Mortgage and cost assumptions for the margin-chart command.
# CLI flags (--down, --rate, etc.) override these when explicitly provided.
#
# tax_rate and insurance_rate are fallback estimates used only when a property
# has no actual annual_tax / annual_homeowners_insurance in the database
# (i.e. detail-page enrichment hasn't been run). Set them to values typical
# for your target market.
chart:
  down: 20          # down payment %
  rate: 6.5         # annual mortgage interest rate %
  years: 30         # loan term in years
  tax_rate: 0.4     # fallback: annual property tax as % of price
  insurance_rate: 0.5  # fallback: annual homeowners insurance as % of price

# Addresses to exclude from all charts.
#   python main.py blacklist add <row-id>        (row ID shown in chart hover)
#   python main.py blacklist remove <fragment>
#   python main.py blacklist list
blacklist: 
  - 9
  - 275
  - 2
  - 525
  - 242
  

